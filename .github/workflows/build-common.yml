name: Build Common

on:
  workflow_call:
    inputs:
      device:
        required: true
        type: string
      prefix:
        required: false
        type: string
    secrets:
      repo:
        required: true
      ssh_key:
        required: true
      chat_id:
        required: true
      TELEGRAM_BOT_TOKEN:
        required: true
      TELEGRAM_SAVE_FILE:
        required: true

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      # Ma trận chỉ chạy theo thiết bị để giảm số lượng Jobs thực tế
      matrix:
        device: ${{ fromJson(inputs.device) }}
      fail-fast: false

    name: "Build Group: ${{ matrix.device }}"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          repository: ${{ secrets.repo }}
          ref: ${{ vars.BRANCH }}
          ssh-key: ${{ secrets.ssh_key }}
          fetch-depth: 1
          path: repo
          persist-credentials: false

      - name: Setup environment
        run: |
          sudo apt-get update
          sudo apt-get install -y bison flex libssl-dev python3 python-is-python3 libarchive-tools zstd make unzip zip
          
          echo "ARCH=arm64" >> $GITHUB_ENV
          echo "PLATFORM_VERSION=12" >> $GITHUB_ENV
          echo "ANDROID_MAJOR_VERSION=s" >> $GITHUB_ENV
          echo "LLVM=1" >> $GITHUB_ENV
          echo "KBUILD_BUILD_USER=Long" >> $GITHUB_ENV
          echo "KBUILD_BUILD_HOST=Long-CI" >> $GITHUB_ENV
          echo "TIME=$(date +%y%m%d)" >> $GITHUB_ENV

      - name: Setup toolchain
        run: |
          mkdir -p "$HOME/toolchains/neutron-clang"
          cd "$HOME/toolchains/neutron-clang"
          bash <(curl -s "https://raw.githubusercontent.com/Neutron-Toolchains/antman/main/antman") -S
          echo "$HOME/toolchains/neutron-clang/bin" >> $GITHUB_PATH

      - name: Integrated Build Loop
        run: |
          cd repo
          
          # Clone AnyKernel3 một lần duy nhất bên ngoài vòng lặp
          git clone --depth=1 https://github.com/longuirom/AnyKernel3 AnyKernel3_Folder

          # Định nghĩa danh sách các biến thể
          KSU_LIST=("_ksunV1" "_ksunV3" "_resukisu" "")
          SUSFS_LIST=("_susfs" "")
          DEBUG_LIST=("_permissive" "")

          for ksu in "${KSU_LIST[@]}"; do
            for susfs in "${SUSFS_LIST[@]}"; do
              for debug in "${DEBUG_LIST[@]}"; do
                
                # --- Logic loại trừ (Exclude) ---
                if [[ -z "$ksu" && "$susfs" == "_susfs" ]]; then continue; fi
                if [[ -z "$ksu" && "$debug" == "_permissive" ]]; then continue; fi
                if [[ "$susfs" == "_susfs" && "$debug" == "_permissive" ]]; then continue; fi
                
                echo "========================================================="
                echo "STARTING BUILD: DEVICE=${{ matrix.device }} KSU=$ksu SUSFS=$susfs DEBUG=$debug"
                echo "========================================================="

                # Reset source và dọn dẹp KSU cũ để tránh xung đột giữa các lần lặp
                git checkout . 
                git clean -fd
                rm -rf KernelSU

                # Clone KSU tương ứng
                if [ "$ksu" = "_ksunV1" ]; then
                   if [ "$susfs" = "" ]; then BRANCH="v1.1.1"; else BRANCH="v1.1.1-susfs1.5.11"; fi
                   git clone --depth=1 -b $BRANCH https://github.com/longuirom/KernelSU-Next KernelSU
                elif [ "$ksu" = "_ksunV3" ]; then
                   if [ "$susfs" = "" ]; then BRANCH="legacy"; else BRANCH="legacy_susfs"; fi
                   git clone --depth=1 -b $BRANCH https://github.com/longuirom/KernelSU-Next KernelSU
                elif [ "$ksu" = "_resukisu" ]; then
                   git clone --depth=1 https://github.com/longuirom/ReSukiSU KernelSU
                else
                   # Bản No-KSU mặc định (hoặc xử lý tùy ý)
                   git clone --depth=1 -b v1.1.1 https://github.com/longuirom/KernelSU-Next KernelSU
                fi

                # Apply Patches
                if [[ "$ksu" == "_ksunV3" || "$ksu" == "_resukisu" ]]; then
                  for i in {1..7}; do patch -p1 < "ksun_v3_$i"; done
                fi

                if [ "$ksu" = "_resukisu" ]; then
                  patch -p1 < resukisu
                  [ "$susfs" = "_susfs" ] && patch -p1 < resukisu_susfs
                fi

                # Config & Build
                make exynos9610-${{ matrix.device }}_defconfig
                
                [ "$debug" = "_permissive" ] && scripts/config -e CONFIG_SECURITY_SELINUX_ALWAYS_PERMISSIVE
                [ -z "$ksu" ] && scripts/config -d CONFIG_KSU
                
                if [ -n "$susfs" ]; then
                  if [ "$ksu" = "_resukisu" ]; then
                    scripts/config -e KSU_SUSFS -e KSU_SUSFS_SUS_PATH -e KSU_SUSFS_SUS_MOUNT -e KSU_SUSFS_SUS_KSTAT -e KSU_SUSFS_SPOOF_UNAME -d KSU_SUSFS_ENABLE_LOG -e KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS -e KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG -e KSU_SUSFS_OPEN_REDIRECT -e KSU_SUSFS_SUS_MAP
                    scripts/config -d KSU_MANUAL_HOOK_AUTO_SETUID_HOOK -d KSU_MANUAL_HOOK_AUTO_INITRC_HOOK -d KSU_MANUAL_HOOK_AUTO_INPUT_HOOK -e CONFIG_KSU_MULTI_MANAGER_SUPPORT -e CONFIG_KSU_MANUAL_HOOK
                  else
                    scripts/config -d CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT
                  fi
                else
                  scripts/config -d CONFIG_KSU_SUSFS
                fi

                # Biên dịch
                make -j$(nproc) LLVM=1

                # Package AnyKernel3 & Upload Telegram
                if [ -f "arch/arm64/boot/Image" ] && [ "${{ vars.POST_FILE }}" = "true" ]; then
                  OUT_NAME="LONG_${{ matrix.device }}_${{ env.TIME }}${ksu}${susfs}${debug}${{ inputs.prefix }}"
                  
                  # Copy Image vào folder AnyKernel3 duy nhất
                  cp arch/arm64/boot/Image AnyKernel3_Folder/
                  
                  cd AnyKernel3_Folder
                  zip -r "../${OUT_NAME}.zip" ./* -x ".git/*"
                  cd ..
                  
                  # Gửi file qua Telegram
                  curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument" \
                    -F chat_id=${{ secrets.chat_id }} \
                    -F document=@${OUT_NAME}.zip -o response.json
                  
                  # Lưu log Telegram
                  curl -X POST "${{ secrets.TELEGRAM_SAVE_FILE }}" \
                    -H "Content-Type: application/json" \
                    -d @response.json
                  
                  # Dọn dẹp file zip và Image cũ để chuẩn bị cho biến thể sau
                  rm "${OUT_NAME}.zip"
                  rm AnyKernel3_Folder/Image
                else
                  echo "BUILD FAILED for $OUT_NAME"
                fi

              done
            done
          done