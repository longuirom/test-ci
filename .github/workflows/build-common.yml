name: Build Common

on:
  workflow_call:
    inputs:
      device:
        required: true
        type: string
      prefix:
        required: false
        type: string
    secrets:
      repo:
        required: true
      ssh_key:
        required: true
      chat_id:
        required: true
      TELEGRAM_BOT_TOKEN:
        required: true
      TELEGRAM_SAVE_FILE:
        required: true

jobs:
  build:
    runs-on: ubuntu-24.04

    strategy:
      matrix:
        device: ${{ fromJson(inputs.device) }}
        ksu: ${{ fromJson(vars.ksu) }}
        susfs: [ _susfs, "" ]
        debug: [ _permissive, "" ]
        exclude:
          - ksu: ""
            susfs: _susfs
          - ksu: ""
            debug: _permissive
          - susfs: _susfs
            debug: _permissive
          - ksu: _resukisu
            susfs: _susfs

    name: "${{ matrix.device }}${{ matrix.ksu }}${{ matrix.susfs }}${{ matrix.debug
      }}"

    env:
      TARGET_REF: ${{ matrix.ksu == '_ksunV3' && vars.BRANCH_KSUV3 || matrix.ksu ==
        '_resukisu' && vars.BRANCH_RESUKISU || vars.release }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.repo }}
          ref: ${{ env.TARGET_REF }}
          ssh-key: ${{ secrets.ssh_key }}
          path: repo
          fetch-depth: 1

      - name: Setup env
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bison flex libssl-dev python3 python-is-python3 \
            libarchive-tools zstd make unzip zip

          echo "ARCH=arm64" >> $GITHUB_ENV
          echo "LLVM=1" >> $GITHUB_ENV
          echo "KBUILD_BUILD_USER=Long" >> $GITHUB_ENV
          echo "KBUILD_BUILD_HOST=CI" >> $GITHUB_ENV
          echo "TIME=$(date +%y%m%d)" >> $GITHUB_ENV

      - name: Setup toolchain + KernelSU
        run: |
          cd repo

          case "${{ matrix.ksu }}_${{ matrix.susfs }}" in
            "_ksunV1_")
              git clone --depth=1 -b v1.1.1 https://github.com/longuirom/KernelSU-Next KernelSU
              ;;
            "_ksunV1__susfs")
              git clone --depth=1 -b v1.1.1-susfs1.5.11 https://github.com/longuirom/KernelSU-Next KernelSU
              ;;
            "_ksunV3_")
              git clone --depth=1 -b legacy https://github.com/longuirom/KernelSU-Next KernelSU
              ;;
            "_ksunV3__susfs")
              git clone --depth=1 -b legacy-susfs https://github.com/longuirom/KernelSU-Next KernelSU
              ;;
            "_resukisu_"|"_resukisu__susfs")
              git clone --depth=1 https://github.com/longuirom/ReSukiSU KernelSU
              ;;
            *)
              git clone --depth=1 -b v1.1.1 https://github.com/longuirom/KernelSU-Next KernelSU
              ;;
          esac

          mkdir -p "$HOME/toolchains/neutron-clang"
          cd "$HOME/toolchains/neutron-clang"
          bash <(curl -s "https://raw.githubusercontent.com/Neutron-Toolchains/antman/main/antman") -S
          echo "$HOME/toolchains/neutron-clang/bin" >> $GITHUB_PATH

      - name: Build kernel
        run: |
          cd repo

          # base config
          make exynos9610-${{ matrix.device }}_defconfig

          # debug
          if [ "${{ matrix.debug }}" = "_permissive" ]; then
            scripts/config -e CONFIG_SECURITY_SELINUX_ALWAYS_PERMISSIVE
          fi

          # KSU
          if [ "${{ matrix.ksu }}" = "" ]; then
            scripts/config -d CONFIG_KSU
          else
            scripts/config -e CONFIG_KSU
          fi

          # SUSFS (optional - nếu branch default rồi thì không cần)
          if [ "${{ matrix.susfs }}" = "" ]; then
            scripts/config -d CONFIG_KSU_SUSFS
          else
            scripts/config -e CONFIG_KSU_SUSFS
            if [ "${{ matrix.ksu }}" = "_resukisu" ]; then
              scripts/config -e CONFIG_KSU_SUSFS_SUS_PATH
              scripts/config -e CONFIG_KSU_SUSFS_SUS_MOUNT
              scripts/config -e CONFIG_KSU_SUSFS_SUS_KSTAT
              scripts/config -e CONFIG_KSU_SUSFS_SPOOF_UNAME
              scripts/config -d CONFIG_KSU_SUSFS_ENABLE_LOG
              scripts/config -e CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS
              scripts/config -e CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG
              scripts/config -e CONFIG_KSU_SUSFS_OPEN_REDIRECT
              scripts/config -e CONFIG_KSU_SUSFS_SUS_MAP
            else
              scripts/config -d CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT
            fi 
          fi

          # resukisu extra
          if [ "${{ matrix.ksu }}" = "_resukisu" ]; then
            scripts/config -e KSU_MANUAL_HOOK_AUTO_SETUID_HOOK
            scripts/config -e KSU_MANUAL_HOOK_AUTO_INITRC_HOOK
            scripts/config -e KSU_MANUAL_HOOK_AUTO_INPUT_HOOK
            scripts/config -e CONFIG_KSU_MULTI_MANAGER_SUPPORT
            # scripts/config -e CONFIG_KPM
            scripts/config -e CONFIG_KSU_MANUAL_HOOK
          fi

          make -j$(nproc)

      - name: Package
        if: vars.POST_FILE == 'true'
        run: |
          cd repo
          git clone --depth=1 https://github.com/longuirom/AnyKernel3

          cp arch/arm64/boot/Image AnyKernel3/

          NAME="LONG_${{ matrix.device }}_${{ env.TIME }}${{ matrix.ksu }}${{ matrix.susfs }}${{ matrix.debug }}${{ inputs.prefix }}"

          cd AnyKernel3
          zip -r "$NAME.zip" ./*

          curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument" \
            -F chat_id=${{ secrets.chat_id }} \
            -F document=@$NAME.zip -o response.json

          curl -X POST "${{ secrets.TELEGRAM_SAVE_FILE }}" \
            -H "Content-Type: application/json" \
            -d @response.json
