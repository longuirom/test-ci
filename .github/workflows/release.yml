name: release

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        device: [ a51xx, m31nsxx, m31snsxx, m21dd, f41dd ]
        ksu: [ _ksu, "" ]
        susfs: [ _susfs, "" ]
        debug: [ _permissivedebug, "" ]
        exclude:
          - ksu: ""
            debug: _permissivedebug
          - susfs: ""
            debug: _permissivedebug

    name: "DEVICE=${{ matrix.device }} KSU=${{ matrix.ksu }} SUSFS=${{ matrix.susfs }} DEBUG=${{ matrix.debug }}"

    uses: ./.github/workflows/build-common.yml
    with:
      device: ${{ matrix.device }}
      ksu: ${{ matrix.ksu }}
      susfs: ${{ matrix.susfs }}
      debug: ${{ matrix.debug }}
    secrets:
      repo: ${{ secrets.REPO }}
      ssh_key: ${{ secrets.SSH_PRIVATE_KEY }}
      chat_id: ${{ secrets.TELEGRAM_CHAT_ID }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_SAVE_FILE: ${{ secrets.TELEGRAM_SAVE_FILE }}
