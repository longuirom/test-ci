name: test-m31nsxx

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        device: [ m31nsxx ]
        ksu: [ _ksu, "" ]
        susfs: [ _susfs, "" ]
        debug: [ _permissivedebug, "" ]
        exclude:
          - ksu: ""
            susfs: _susfs
          - ksu: ""
            debug: _permissivedebug

    uses: ./.github/workflows/build-common.yml
    with:
      device: ${{ matrix.device }}
      ksu: ${{ matrix.ksu }}
      susfs: ${{ matrix.susfs }}
      debug: ${{ matrix.debug }}
      prefix: "_test"
    secrets:
      repo: ${{ secrets.REPO }}
      ssh_key: ${{ secrets.SSH_PRIVATE_KEY }}
      chat_id: ${{ secrets.TELEGRAM_CHAT_ID_TEST }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_SAVE_FILE: ${{ secrets.TELEGRAM_SAVE_FILE }}
